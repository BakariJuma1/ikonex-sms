services:
  - type: web
    name: ikonex-sms-api
    runtime: node
    rootDir: server
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: node app.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ikonex-sms-db
          property: connectionString

databases:
  - name: ikonex-sms-db
    databaseName: ikonex_sms
    plan: free
